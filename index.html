<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キャンディ風パズル（コンボ付き）</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #222;
    color: white;
}

#game {
    display: grid;
    grid-template-columns: repeat(8, 50px);
    gap: 5px;
    justify-content: center;
    margin: 20px auto;
}

.cell {
    width: 50px;
    height: 50px;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 10px;
    background: #333;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.3s;
}

.match {
    animation: pop 0.3s ease;
}

@keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); opacity: 0.5; }
    100% { transform: scale(0); opacity: 0; }
}

#combo {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 40px;
    color: gold;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>🍬 お菓子パズル</h1>
<div>スコア: <span id="score">0</span></div>
<div>残り手数: <span id="moves">20</span></div>

<div id="game"></div>
<div id="combo"></div>

<button onclick="restartGame()">リスタート</button>

<script>
const width = 8;
const candies = ["🍬","🍩","🍪","🍫","🍭"];
let board = [];
let score = 0;
let moves = 20;
let selected = null;
let combo = 0;

const game = document.getElementById("game");
const comboText = document.getElementById("combo");

function createBoard() {
    board = [];
    game.innerHTML = "";
    for (let i = 0; i < width * width; i++) {
        const candy = randomCandy();
        board.push(candy);

        const div = document.createElement("div");
        div.className = "cell";
        div.innerText = candy;
        div.dataset.index = i;

        div.addEventListener("click", handleClick);
        game.appendChild(div);
    }
}

function randomCandy() {
    return candies[Math.floor(Math.random() * candies.length)];
}

function isAdjacent(i, j) {
    const x1 = i % width;
    const y1 = Math.floor(i / width);
    const x2 = j % width;
    const y2 = Math.floor(j / width);
    return (Math.abs(x1 - x2) + Math.abs(y1 - y2)) === 1;
}

function handleClick(e) {
    if (moves <= 0) return;

    const index = Number(e.target.dataset.index);

    if (selected === null) {
        selected = index;
        e.target.style.outline = "3px solid white";
    } else {
        if (!isAdjacent(selected, index)) {
            selected = null;
            redraw();
            return;
        }

        swap(selected, index);
        let matches = findMatches();

        if (matches.length > 0) {
            moves--;
            combo = 0; // 最初の1手はコンボリセット
            updateBoard();
        } else {
            swap(selected, index);
            selected = null;
            redraw();
        }
    }
}

function swap(i, j) {
    [board[i], board[j]] = [board[j], board[i]];
}

function findMatches() {
    let set = new Set();

    // 横
    for (let i = 0; i < width * width; i++) {
        if (i % width > width - 3) continue;
        let base = board[i];
        let temp = [i];

        for (let j = 1; j < width; j++) {
            if (board[i + j] === base) temp.push(i + j);
            else break;
        }

        if (temp.length >= 3) temp.forEach(x => set.add(x));
    }

    // 縦
    for (let i = 0; i < width * (width - 2); i++) {
        let base = board[i];
        let temp = [i];

        for (let j = 1; j < width; j++) {
            if (board[i + j * width] === base) temp.push(i + j * width);
            else break;
        }

        if (temp.length >= 3) temp.forEach(x => set.add(x));
    }

    return Array.from(set);
}

function updateBoard() {
    const cells = document.querySelectorAll(".cell");
    let matches = findMatches();

    if (matches.length > 0) {
        combo++;

        if (combo >= 2) showCombo(combo);

        matches.forEach(i => cells[i].classList.add("match"));

        setTimeout(() => {
            matches.forEach(i => board[i] = null);

            // スコア（コンボ倍率）
            score += matches.length * 10 * combo;

            drop();
            refill();
            redraw();
            updateInfo();

            setTimeout(updateBoard, 200);
        }, 300);

    } else {
        selected = null;
        redraw();
    }
}

function showCombo(c) {
    comboText.innerText = c + " COMBO!";
    comboText.style.opacity = 1;

    setTimeout(() => {
        comboText.style.opacity = 0;
    }, 800);
}

function drop() {
    for (let i = width * width - 1; i >= 0; i--) {
        if (board[i] === null) {
            let above = i - width;
            while (above >= 0) {
                if (board[above] !== null) {
                    board[i] = board[above];
                    board[above] = null;
                    break;
                }
                above -= width;
            }
        }
    }
}

function refill() {
    for (let i = 0; i < board.length; i++) {
        if (board[i] === null) {
            board[i] = randomCandy();
        }
    }
}

function redraw() {
    const cells = document.querySelectorAll(".cell");
    cells.forEach((cell, i) => {
        cell.innerText = board[i];
        cell.classList.remove("match");
        cell.style.outline = "none";
    });
}

function updateInfo() {
    document.getElementById("score").innerText = score;
    document.getElementById("moves").innerText = moves;

    if (moves <= 0) {
        setTimeout(() => {
            alert("ゲーム終了！スコア: " + score);
        }, 100);
    }
}

function restartGame() {
    score = 0;
    moves = 20;
    combo = 0;
    selected = null;
    updateInfo();
    createBoard();
}

createBoard();
</script>

</body>
</html>
