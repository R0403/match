<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>キャンディ風パズル強化版</title>
<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #222;
    color: white;
}

#game {
    display: grid;
    grid-template-columns: repeat(8, 50px);
    grid-gap: 5px;
    justify-content: center;
    margin: 20px auto;
}

.cell {
    width: 50px;
    height: 50px;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.3s;
}

.match {
    animation: pop 0.3s ease;
}

@keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); opacity: 0.5; }
    100% { transform: scale(0); opacity: 0; }
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>🍬 キャンディ風パズル（強化版）</h1>
<div>スコア: <span id="score">0</span></div>
<div>残り手数: <span id="moves">20</span></div>

<div id="game"></div>

<button onclick="restartGame()">リスタート</button>

<script>
const width = 8;
const colors = ["red","yellow","green","blue","purple"];
let board = [];
let score = 0;
let moves = 20;
let selected = null;

const game = document.getElementById("game");

function createBoard() {
    board = [];
    game.innerHTML = "";
    for (let i = 0; i < width * width; i++) {
        const color = randomColor();
        board.push(color);

        const div = document.createElement("div");
        div.className = "cell";
        div.style.background = color;
        div.dataset.index = i;

        div.addEventListener("click", handleClick);
        game.appendChild(div);
    }
}

function randomColor() {
    return colors[Math.floor(Math.random() * colors.length)];
}

function handleClick(e) {
    if (moves <= 0) return;

    const index = Number(e.target.dataset.index);

    if (selected === null) {
        selected = index;
        e.target.style.outline = "3px solid white";
    } else {
        swap(selected, index);
        selected = null;
        moves--;
        updateInfo();
        updateBoard();
    }
}

function swap(i, j) {
    const temp = board[i];
    board[i] = board[j];
    board[j] = temp;
}

function updateBoard() {
    const cells = document.querySelectorAll(".cell");

    let matches = findMatches();

    if (matches.length > 0) {
        matches.forEach(i => {
            cells[i].classList.add("match");
        });

        setTimeout(() => {
            matches.forEach(i => board[i] = null);

            // ボーナス処理
            if (matches.length >= 4) {
                score += matches.length * 20; // ボーナス
            } else {
                score += matches.length * 10;
            }

            drop();
            refill();
            redraw();
            updateInfo();

            // 連鎖
            setTimeout(updateBoard, 200);
        }, 300);

    } else {
        redraw();
    }
}

function findMatches() {
    let matchSet = new Set();

    // 横
    for (let i = 0; i < width * width; i++) {
        if (i % width > width - 3) continue;
        let color = board[i];
        if (!color) continue;

        let temp = [i];
        for (let j = 1; j < width; j++) {
            if (board[i + j] === color) {
                temp.push(i + j);
            } else break;
        }
        if (temp.length >= 3) temp.forEach(x => matchSet.add(x));
    }

    // 縦
    for (let i = 0; i < width * (width - 2); i++) {
        let color = board[i];
        if (!color) continue;

        let temp = [i];
        for (let j = 1; j < width; j++) {
            if (board[i + j * width] === color) {
                temp.push(i + j * width);
            } else break;
        }
        if (temp.length >= 3) temp.forEach(x => matchSet.add(x));
    }

    return Array.from(matchSet);
}

function drop() {
    for (let i = width * width - 1; i >= 0; i--) {
        if (board[i] === null) {
            let above = i - width;
            while (above >= 0) {
                if (board[above] !== null) {
                    board[i] = board[above];
                    board[above] = null;
                    break;
                }
                above -= width;
            }
        }
    }
}

function refill() {
    for (let i = 0; i < board.length; i++) {
        if (board[i] === null) {
            board[i] = randomColor();
        }
    }
}

function redraw() {
    const cells = document.querySelectorAll(".cell");
    cells.forEach((cell, i) => {
        cell.style.background = board[i];
        cell.classList.remove("match");
        cell.style.outline = "none";
    });
}

function updateInfo() {
    document.getElementById("score").innerText = score;
    document.getElementById("moves").innerText = moves;

    if (moves <= 0) {
        setTimeout(() => {
            alert("ゲーム終了！スコア: " + score);
        }, 100);
    }
}

function restartGame() {
    score = 0;
    moves = 20;
    selected = null;
    updateInfo();
    createBoard();
}

createBoard();
</script>

</body>
</html>
